<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>嘉欣的订单查询助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 550px;
            padding: 40px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 15px;
            color: #667eea;
        }
        
        .business-name {
            font-size: 24px;
            color: #333;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 15px;
            text-align: left;
            display: none;
            border: 1px solid #e0e0e0;
        }
        
        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        .result-title {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }
        
        .result-item {
            margin-bottom: 15px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            border-left: 5px solid #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .result-label {
            color: #888;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .result-value {
            color: #333;
            font-size: 16px;
            font-weight: 500;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            margin-left: 10px;
        }
        
        .status-completed {
            background: #d4edda;
            color: #155724;
        }
        
        .status-inprogress {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status-resend {
            background: #cce5ff;
            color: #004085;
        }
        
        .loading {
            display: none;
            margin-top: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        .example {
            margin-top: 25px;
            font-size: 14px;
            color: #888;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }
        
        .example-title {
            color: #666;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .example-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        .example-item {
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .example-item:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        footer {
            margin-top: 30px;
            color: #999;
            font-size: 14px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .contact-info {
            margin-top: 10px;
            color: #667eea;
            font-weight: 500;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
            
            .business-name {
                font-size: 20px;
            }
            
            .logo {
                font-size: 40px;
            }
            
            .example-list {
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📦</div>
        <div class="business-name">嘉欣的订单查询助手</div>
        <p class="subtitle">输入订单号，实时查询物流状态和进度</p>
        
        <div class="input-group">
            <label for="orderNumber">📝 订单号查询</label>
            <input type="text" id="orderNumber" placeholder="请输入您的订单号，如：EV070804591CN" autocomplete="off">
        </div>
        
        <button class="btn" id="queryBtn">
            🔍 查询订单状态
        </button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="text-align: center; margin-top: 10px; color: #666;">正在查询中，请稍候...</p>
        </div>
        
        <div class="result" id="result">
            <div class="result-title">📋 订单查询结果</div>
            <div class="result-item">
                <div class="result-label">订单号</div>
                <div class="result-value" id="result-order">-</div>
            </div>
            <div class="result-item">
                <div class="result-label">客户姓名</div>
                <div class="result-value" id="result-customer">-</div>
            </div>
            <div class="result-item">
                <div class="result-label">订单状态</div>
                <div class="result-value" id="result-status">-</div>
            </div>
            <div class="result-item">
                <div class="result-label">物流信息</div>
                <div class="result-value" id="result-logistics">-</div>
            </div>
            <div class="result-item">
                <div class="result-label">最后更新时间</div>
                <div class="result-value" id="result-time">-</div>
            </div>
        </div>
        
        <div class="example">
            <div class="example-title">📌 示例订单号（点击快速查询）</div>
            <div class="example-list">
                <div class="example-item" onclick="setExample('EV070804591CN')">EV070804591CN</div>
                <div class="example-item" onclick="setExample('YT2543954036002')">YT2543954036002</div>
                <div class="example-item" onclick="setExample('2019317748244361')">2019317748244361</div>
                <div class="example-item" onclick="setExample('YT2584647636459')">YT2584647636459</div>
                <div class="example-item" onclick="setExample('EV070596315CN')">EV070596315CN</div>
            </div>
        </div>
        
        <footer>
            <p>💡 温馨提示：</p>
            <p>• 订单号不区分大小写</p>
            <p>• 物流信息每日更新</p>
            <p>• 如有疑问，请及时联系客服</p>
            <div class="contact-info">
                📞 客服微信：嘉欣 | ✨ 技术支持：小新助手
            </div>
            <p style="margin-top: 15px; font-size: 12px; color: #aaa;">
                数据更新时间：2026-03-24 | 版本：1.0
            </p>
        </footer>
    </div>

    <script>
        // 真实订单数据（来自嘉欣的客户日志）
        const orderData = {
            // 潘妍霏的订单
            'YT2584647636459': {
                customer: '潘妍霏',
                status: '已完成',
                statusClass: 'status-completed',
                logistics: '墨镜寄修完成，快递费¥6.05',
                time: '2026-03-22',
                details: '墨镜已成功寄修并返回客户手中'
            },
            'YT2543954036002': {
                customer: '潘妍霏',
                status: '寄回中',
                statusClass: 'status-inprogress',
                logistics: '新眼镜维修完成，圆通快递寄回中，维修费¥11.06',
                time: '2026-03-24（今日）',
                details: '眼镜维修已完成，正在安排快递寄回'
            },
            
            // 逸飞的订单
            'EV070804591CN': {
                customer: '逸飞',
                status: '重新发出',
                statusClass: 'status-resend',
                logistics: '香烟重发，今日重新发货，运输途中',
                time: '2026-03-24（今日）',
                details: '原单EV070596315CN发货失败退回，今日已重新发出'
            },
            'EV070596315CN': {
                customer: '逸飞',
                status: '发货失败退回',
                statusClass: 'status-failed',
                logistics: '香烟订单发货失败，货物已退回',
                time: '2026-03-24',
                details: '国际物流发货失败，货物已退回仓库，已重新安排发货'
            },
            
            // Sssnowy的订单
            '2019317748244361': {
                customer: 'Sssnowy',
                status: '运输中',
                statusClass: 'status-inprogress',
                logistics: '加拿大敏感货，国际运输中，利润¥37',
                time: '2026-03-22',
                details: '海外客户，加拿大敏感货正在运输途中'
            }
        };

        function setExample(orderNumber) {
            document.getElementById('orderNumber').value = orderNumber;
            // 自动查询
            setTimeout(() => {
                document.getElementById('queryBtn').click();
            }, 300);
        }

        document.getElementById('queryBtn').addEventListener('click', function() {
            const orderNumber = document.getElementById('orderNumber').value.trim();
            
            if (!orderNumber) {
                alert('请输入订单号');
                return;
            }
            
            // 显示加载中
            document.getElementById('loading').classList.add('show');
            document.getElementById('result').classList.remove('show');
            
            // 模拟网络请求延迟
            setTimeout(() => {
                // 支持大小写查询
                const orderKey = orderNumber.toUpperCase();
                
                if (orderData[orderKey]) {
                    const data = orderData[orderKey];
                    
                    document.getElementById('result-order').textContent = orderNumber;
                    document.getElementById('result-customer').textContent = data.customer;
                    
                    // 设置状态带样式
                    const statusElement = document.getElementById('result-status');
                    statusElement.textContent = data.status;
                    statusElement.className = 'result-value';
                    if (data.statusClass) {
                        const badge = document.createElement('span');
                        badge.className = `status-badge ${data.statusClass}`;
                        badge.textContent = data.status;
                        statusElement.innerHTML = '';
                        statusElement.appendChild(badge);
                    }
                    
                    document.getElementById('result-logistics').textContent = data.logistics;
                    document.getElementById('result-time').textContent = data.time;
                    
                    document.getElementById('loading').classList.remove('show');
                    document.getElementById('result').classList.add('show');
                    
                    // 自动滚动到结果
                    setTimeout(() => {
                        document.getElementById('result').scrollIntoView({ 
                            behavior: 'smooth',
                            block: 'center'
                        });
                    }, 100);
                } else {
                    document.getElementById('loading').classList.remove('show');
                    
                    // 显示已知订单号列表
                    const knownOrders = Object.keys(orderData).join(', ');
                    alert(`未找到订单号：${orderNumber}\n\n请检查输入是否正确，或联系客服确认。\n\n已知订单号：\n${Object.keys(orderData).map(order => `• ${order}`).join('\n')}`);
                }
            }, 800);
        });

        // 按回车键也可以查询
        document.getElementById('orderNumber').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('queryBtn').click();
            }
        });

        // 页面加载时自动聚焦到输入框
        window.addEventListener('load', function() {
            document.getElementById('orderNumber').focus();
        });
    </script>
</body>
</html>
